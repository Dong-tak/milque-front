name: Deploy to Develop EC2

on:
  push:
    branches:
      - "develop"      
jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    steps:
      # 1. Checkout latest version
      - name: Checkout source code
        uses: actions/checkout@v4.1.1

      # 2. Cache node_modules for faster dependency installation
      - name: Cache node_modules
        uses: actions/cache@v2
        with:
          path: node_modules
          key: ${{ runner.os }}-node_modules-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node_modules-

      # 3. Create .env file for build and runtime
      - name: Create .env file
        run: |
          set -e
          echo "${{ secrets.ENV }}" > .env
          cat .env  # 빌드 타임에 확인을 위해 출력
          
      # 4. Build and push Docker image with .env file included
      - name: Build and push Docker image
        run: |
          set -e
          echo $DOCKER_TOKEN | docker login -u $DOCKER_ID --password-stdin
          docker build --build-arg ENV_FILE=.env \
            -t $DOCKER_ID/$DOCKER_REPO:frontdev ./
          docker push $DOCKER_ID/$DOCKER_REPO:frontdev
        env:
          DOCKER_ID: ${{ secrets.DOCKER_ID }}
          DOCKER_TOKEN: ${{ secrets.DOCKER_TOKEN }}
          DOCKER_REPO: ${{ secrets.DOCKER_REPO }}

      # 5. SSH into EC2, create .env file and deploy Docker container
      - name: SSH into EC2 and deploy Docker container
        uses: appleboy/ssh-action@master
        with:
          host: ec2-3-37-138-4.ap-northeast-2.compute.amazonaws.com
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            sudo docker system prune -a -f --volumes

            # .env 파일이 이미 있으면 삭제
            rm -f /home/ec2-user/milque-front/.env

            # .env 파일 생성
            echo "${{ secrets.ENV }}" > /home/ec2-user/milque-front/.env
            chmod 600 /home/ec2-user/milque-front/.env  # 보안 위해 파일 권한 설정

            # 기존 front 컨테이너 중지 및 제거
            if [ $(docker ps -aq -f name=front) ]; then
              sudo docker stop front
              sudo docker rm front
            fi

            # 새로운 이미지 pull
            sudo docker pull tothedock/tothedocks:frontdev

            # 네트워크 생성 (필요한 경우)
            sudo docker network ls | grep mileque-network || docker network create mileque-network

            # 새로운 컨테이너 실행
            sudo docker run -d --name front --env-file /home/ec2-user/milque-front/.env --network mileque-network -p 3000:3000 tothedock/tothedocks:frontdev
        env:
          DOCKER_ID: ${{ secrets.DOCKER_ID }}
          DOCKER_TOKEN: ${{ secrets.DOCKER_TOKEN }}
          DOCKER_REPO: ${{ secrets.DOCKER_REPO }}
          
      - name: Slack Notification on Success
        if: success()
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {
              "blocks": [
                { "type": "divider" },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": ":white_check_mark: *Build and Deploy Success*"
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    { "type": "mrkdwn", "text": "*Repository*\n${{ github.repository }}" },
                    { "type": "mrkdwn", "text": "*Branch*\n${{ github.ref }}" },
                    { "type": "mrkdwn", "text": "*Commit*\n${{ github.sha }}" },
                    { "type": "mrkdwn", "text": "*Author*\n${{ github.actor }}" },
                    { "type": "mrkdwn", "text": "*Event Name*\n${{ github.event_name }}" },
                    { "type": "mrkdwn", "text": "*Workflow*\n${{ github.workflow }}" },
                    { "type": "mrkdwn", "text": "*Job ID*\n${{ github.run_id }}" },
                    { "type": "mrkdwn", "text": "*Duration*\n${{ github.run_duration_ms }} ms" }
                  ]
                },
                {
                  "type": "actions",
                  "elements": [
                    { "type": "button", "text": { "type": "plain_text", "text": "View Action" }, "url": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.FRONT_SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
      
      - name: Slack Notification on Failure
        if: failure()  
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {
              "blocks": [
                { "type": "divider" },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": ":x: *Build or Deploy Failure*"
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    { "type": "mrkdwn", "text": "*Repository*\n${{ github.repository }}" },
                    { "type": "mrkdwn", "text": "*Branch*\n${{ github.ref }}" },
                    { "type": "mrkdwn", "text": "*Commit*\n${{ github.sha }}" },
                    { "type": "mrkdwn", "text": "*Author*\n${{ github.actor }}" },
                    { "type": "mrkdwn", "text": "*Event Name*\n${{ github.event_name }}" },
                    { "type": "mrkdwn", "text": "*Workflow*\n${{ github.workflow }}" },
                    { "type": "mrkdwn", "text": "*Job ID*\n${{ github.run_id }}" },
                    { "type": "mrkdwn", "text": "*Duration*\n${{ github.run_duration_ms }} ms" }
                  ]
                },
                {
                  "type": "actions",
                  "elements": [
                    { "type": "button", "text": { "type": "plain_text", "text": "View Action" }, "url": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.FRONT_SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
