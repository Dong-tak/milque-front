name: Push Docker Image to AWS ECR

on:
  push:
    branches:
      - "main"
  pull_request:
    branches:
      - "main"
    paths:
      - 'develop'
      - 'feat/**'
      - 'release/**'
      - 'release'

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Cache Node modules
        id: cache-node-modules
        uses: actions/cache@v2
        with:
          path: '**/node_modules'
          key: ${{ runner.os }}-node-modules-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-modules-

      - name: Cache Next.js build cache
        id: cache-nextjs
        uses: actions/cache@v2
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-cache-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-cache-

      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci

      - name: Get current time
        uses: 1466587594/get-current-time@v2
        id: current-time
        with:
          format: YYYY-MM-DDTHH-mm-ss
          utcOffset: "+09:00"

      - name: Show Current Time
        run: echo "CurrentTime=${{steps.current-time.outputs.formattedTime}}"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build, tag, and push image to Amazon ECR
        run: |
          docker build -t mileque-front:${{steps.current-time.outputs.formattedTime}} .
          docker tag mileque-front:${{steps.current-time.outputs.formattedTime}} 211125602993.dkr.ecr.ap-northeast-2.amazonaws.com/mileque-front:${{steps.current-time.outputs.formattedTime}}
          docker push 211125602993.dkr.ecr.ap-northeast-2.amazonaws.com/mileque-front:${{steps.current-time.outputs.formattedTime}}

      - name: Post job cleanup
        run: |
          echo "Cleaning up caches"
          rm -rf .next/cache
          rm -rf **/node_modules
          
      - name: Slack Notification on Success
        if: success() # 이 step은 job이 성공한 경우에만 실행된다.
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "channel": "front-request",
              "attachments": [
                {
                  "color": "#36a64f", # 성공시 연두색
                  "title": "push to AWS ECR 성공 :white_check_mark: in Main Branch ",
                  "title_link": "https://github.com/${{github.repository}}/actions/runs/${{github.run_id}}",
                  "text": "The action has succeeded for the following job: `${{ github.job }}`",
                  "fields": [
                    {
                      "title": "Repository",
                      "value": "${{ github.repository }}",
                      "short": true
                    },
                    {
                      "title": "Branch",
                      "value": "${{ github.ref }}",
                      "short": true
                    },
                    {
                      "title": "Docker Build and Push",
                      "value": "Successfully built and pushed Docker image to ECR",
                      "short": true
                    }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.FRONT_SLACK_WEBHOOK_URL }}
      
      - name: Slack Notification on Failure
        if: failure() # 이 step은 job이 실패한 경우에만 실행됩니다.
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "channel": "front-request",
              "attachments": [
                {
                  "color": "#ff0000", # 실패시 빨간색
                  "title": "push to AWS ECR 실패 :x: in Main Branch ",
                  "title_link": "https://github.com/${{github.repository}}/actions/runs/${{github.run_id}}",
                  "text": "The action has failed for the following job: `${{ github.job }}`",
                  "fields": [
                    {
                      "title": "Repository",
                      "value": "${{ github.repository }}",
                      "short": true
                    },
                    {
                      "title": "Branch",
                      "value": "${{ github.ref }}",
                      "short": true
                    },
                    {
                      "title": "Docker Build and Push",
                      "value": "Failed to build or push Docker image to ECR",
                      "short": true
                    }
                  ]      
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.FRONT_SLACK_WEBHOOK_URL }}
